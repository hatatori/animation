<style>

    @import url('layout.css');

    *{
        transition: 0.5s ease;
    }

    .centro{
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .bloco{
        padding: 50px;
        background-color: #00000011;
        transform-style: preserve-3d;
        perspective: 300px;
        display: inline-block;
        margin: 5px;
        margin-left:0px;
        text-align: center;
    }

    .square{
        width: 100px;
        height: 100px;
        background-color:#ffcc33;
        border-radius: 10px;
    }

    /* rotate */
    .bloco:hover .a1{transform: rotateY(45deg);} 
    .bloco:hover .a2{transform: rotateX(45deg);}  
    .bloco:hover .a3{transform: rotate(45deg);} 
    .bloco:hover .a4{transform: rotate3d(1, 1, 1, 45deg);}

    .bloco:active .a1{transform: rotateY(-45deg);}
    .bloco:active .a2{transform: rotateX(-45deg);} 
    .bloco:active .a3{transform: rotate(-45deg);}
    .bloco:active .a4{transform: rotate3d(-1, -1, -1, 45deg);}

    /* translate */
    .bloco:hover .b1{transform: translateX(50px);}
    .bloco:hover .b2{transform: translateY(50px);}
    .bloco:hover .b3{transform: translateZ(50px);}
    .bloco:hover .b4{transform: translate(50px,50px);}
    .bloco:hover .b5{transform: translate3d(-50px,-50px,50px);}

    .bloco:active .b1{transform: translateX(-50px);}
    .bloco:active .b2{transform: translateY(-50px);}
    .bloco:active .b3{transform: translateZ(-50px);}
    .bloco:active .b4{transform: translate(-50px,-50px);}
    .bloco:active .b5{transform: translate3d(-50px,-50px,-50px);}

    /* scale */
    .bloco:hover .c1{transform: scaleX(1.5)}
    .bloco:hover .c2{transform: scaleY(1.5)}
    .bloco:hover .c3{transform: scale(1.5)}

    .bloco:active .c1{transform: scaleX(0.5)}
    .bloco:active .c2{transform: scaleY(0.5)}
    .bloco:active .c3{transform: scale(0.5)}

    /* skew */
    .bloco:hover .d1{transform: skewX(30deg)}
    .bloco:hover .d2{transform: skewY(30deg)}
    .bloco:hover .d3{transform: skew(30deg,30deg)}
    
    .bloco:active .d1{transform: skewX(-30deg)}
    .bloco:active .d2{transform: skewY(-30deg)}
    .bloco:active .d3{transform: skew(-30deg,-30deg)}

</style>

<div class="container">
    <h1>Rotate</h1>
    <div class="bloco"><div class="square centro a1">rotateY</div></div>
    <div class="bloco"><div class="square centro a2">rotateX</div></div>
    <div class="bloco"><div class="square centro a3">rotate</div></div>
    <div class="bloco"><div class="square centro a4">rotate3d</div></div>

    <h1>Translate</h1>
    <div class="bloco"><div class="square centro b1">translateX</div></div>
    <div class="bloco"><div class="square centro b2">translateY</div></div>
    <div class="bloco"><div class="square centro b3">translateZ</div></div>
    <div class="bloco"><div class="square centro b4">translate</div></div>
    <div class="bloco"><div class="square centro b5">translate3d</div></div>

    <h1>Scale</h1>
    <div class="bloco"><div class="square centro c1">scaleX</div></div>
    <div class="bloco"><div class="square centro c2">scaleY</div></div>
    <div class="bloco"><div class="square centro c3">scale</div></div>

    <h1>Skew</h1>
    <div class="bloco"><div class="square centro d1">skewX</div></div>
    <div class="bloco"><div class="square centro d2">skewY</div></div>
    <div class="bloco"><div class="square centro d3">skew</div></div>

</div>
